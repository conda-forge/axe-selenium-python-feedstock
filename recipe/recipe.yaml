schema_version: 1

context:
  name: axe-selenium-python
  version: "3.0.0"
  python_min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 8f082c821ce0c6c44a326a2df5bc5926c789d9b9600fbc052fb482ef20975513

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=64
    - setuptools_scm >=8
  run:
    - pytest >=3.0
    - python >=${{ python_min }}
    - selenium >=3.0.2

tests:
  - python:
      imports:
        - axe_selenium_python
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python library to integrate axe and selenium for web accessibility testing.
  license: MPL-2.0
  license_file: LICENSE.txt
  homepage: http://github.com/mozilla-services/axe-selenium-python

extra:
  recipe-maintainers:
    - thewchan
